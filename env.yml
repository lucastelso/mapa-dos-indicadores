name: mapa_indicadores
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy=1.24.3
  - pandas>=2.0.0
  - polars>=0.20.0
  - sqlalchemy>=2.0.0
  - psycopg>=3.1.18      # Driver moderno para o PostgreSQL
  - geopandas>=0.14.0    # Essencial para manipular os shapes
  - folium>=0.15.0       # Renderizador base do mapa
  - streamlit>=1.30.0    # Painel
  - pip:
    - ipeadatapy==0.1.8  # API do IPEA (geralmente só tem no pip)
    - geobr==0.2.0       # API do IBGE para puxar os shapes direto do IPEA
    - streamlit-folium   # O bind do mapa para o dashboard
    - plotly>=5.18.0     # Para os gráficos complementares